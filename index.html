<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: #eaeaea;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
  text-align: center;
  animation: fadeIn 2s ease;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  animation: float 3s ease-in-out infinite;
}

section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
}

.video-container {
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  width: 100%;
  height: 70vh;
}

.video-container video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.letter {
  background: rgba(26, 26, 26, 0.8);
  padding: 40px;
  border-radius: 20px;
  line-height: 1.9;
  backdrop-filter: blur(6px);

  opacity: 0;
  transform: translateY(40px);
  transition: all 1.5s ease;
}

.letter.visible {
  opacity: 1;
  transform: translateY(0);
}

.letter h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 25px;
  font-size: 1.8rem;
}

footer {
  text-align: center;
  padding: 60px 20px;
  opacity: 0.6;
  font-size: 0.9rem;
}

.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1.2s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); opacity: 0.7; }
  50% { transform: translateY(-8px); opacity: 1; }
}
</style>
</head>

<body>

<div class="hero">
  <h1>𖹭</h1>
</div>

<section class="fade">
  <div class="video-container">
    <video controls autoplay muted playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
</section>

<section>
  <div class="letter fade">
    <h2>para ti</h2>

    <p>
      no sé si alguna vez te lo dije así, pero conocerte fue como empezar a ver colores
      donde antes no había… como si todo de pronto tuviera más sentido contigo.
    </p>

    <p>
      si alguna vez dudas de lo que significas para mí, vuelve aquí 𖹭
    </p>

  </div>
</section>

<footer>
  <p>gracias por existir</p>
</footer>

<script>
if ('IntersectionObserver' in window) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.fade').forEach(el => observer.observe(el));
} else {
  document.querySelectorAll('.fade').forEach(el => el.classList.add('visible'));
}
</script>

</body>
</html>
