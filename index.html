<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti</title>

  <!-- preconnect reduce el tiempo de carga de las fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #eaeaea;
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
      text-align: center;
      animation: fadeIn 2s ease both;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      margin-bottom: 20px;
    }

    .scroll {
      margin-top: 20px;
      animation: float 2.5s ease-in-out infinite;
      font-size: 1.6rem;
      opacity: 0.8;
      /* evita que la animación desplace el layout */
      will-change: transform, opacity;
    }

    /* ── Secciones ────────────────────────────────────────── */
    section {
      padding: 80px 20px;
      max-width: 900px;
      margin: auto;
    }

    /* ── Vídeo ────────────────────────────────────────────── */
    .video-container {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      width: 100%;
      /* altura relativa al viewport con mínimo razonable */
      height: 70vh;
      min-height: 260px;
      background: #000;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      /*
        contain: muestra el vídeo completo sin recortar.
        cover:   recorta para llenar el contenedor (solo adecuado
                 para vídeos decorativos de fondo sin controles).
        Con controles visibles, contain es la opción correcta.
      */
      object-fit: contain;
      display: block;
    }

    /* ── Carta ────────────────────────────────────────────── */
    .letter {
      background: rgba(26, 26, 26, 0.8);
      padding: 40px;
      border-radius: 20px;
      line-height: 1.9;
      /* prefijo -webkit- necesario para Safari */
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .letter h2 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 25px;
      font-size: 1.8rem;
    }

    /* separación entre párrafos con CSS en lugar de <br> */
    .letter p + p {
      margin-top: 1.2em;
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
      font-size: 0.9rem;
    }

    /* ── Animación de aparición al hacer scroll ───────────── */
    /*
      Bug anterior: .letter también definía opacity/transform/transition
      con la misma especificidad que .fade. Al aparecer .fade después en
      el CSS, sus valores ganaban en cascada: la carta usaba transition 1.2s
      (de .fade) en lugar de 1.5s, y translateY(30px) en lugar de 40px.
      Solución: toda la lógica de entrada vive en .fade; .letter.fade
      (mayor especificidad) sobreescribe solo lo necesario.
    */
    .fade {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    /* la carta entra más lento y desde más abajo */
    .letter.fade {
      transform: translateY(40px);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Keyframes ────────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    opacity: 0.6; }
      50%       { transform: translateY(-6px); opacity: 1;   }
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>esto es para ti</h1>
    <!-- aria-hidden: elemento decorativo, irrelevante para lectores de pantalla -->
    <div class="scroll" aria-hidden="true">𖹭</div>
  </div>

  <section class="fade">
    <div class="video-container">
      <!--
        autoplay + muted: requerido para que el autoplay funcione en todos
        los navegadores modernos (Chrome, Safari, Firefox).
        preload="metadata": descarga solo duración y dimensiones del vídeo,
        no el archivo completo, hasta que el usuario interactúe.
        playsinline: evita que iOS fuerce pantalla completa al reproducir.
      -->
      <video
        controls
        autoplay
        muted
        playsinline
        preload="metadata"
        aria-label="Vídeo para ti">
        <source src="video.mp4" type="video/mp4">
        Tu navegador no soporta la reproducción de vídeo.
      </video>
    </div>
  </section>

  <section>
    <div class="letter fade">
      <h2>para ti</h2>

      <p>
        no sé si alguna vez te lo dije así, pero conocerte fue como empezar a ver colores
        donde antes no había… como si todo de pronto tuviera más sentido contigo.
      </p>

      <p>
        si alguna vez dudas de lo que significas para mí, vuelve aquí 𖹭
      </p>
    </div>
  </section>

  <footer>
    <p>gracias por existir</p>
  </footer>

  <script>
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            // dejar de observar tras el primer disparo evita trabajo innecesario
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.fade').forEach(el => observer.observe(el));
    } else {
      // fallback: mostrar todo si el navegador no soporta IntersectionObserver
      document.querySelectorAll('.fade').forEach(el => el.classList.add('visible'));
    }
  </script>

</body>
</html>
